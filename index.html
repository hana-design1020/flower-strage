<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <title>Salesforce Admin Practice Loop</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="学習状況">
        <div>
          <p class="eyebrow">Salesforce Administrator</p>
          <h1>Practice Loop</h1>
        </div>
        <div class="score-strip">
          <div>
            <span id="answeredCount">0</span>
            <small>回答</small>
          </div>
          <div>
            <span id="accuracy">0%</span>
            <small>正答率</small>
          </div>
          <div>
            <span id="streak">0</span>
            <small>連続</small>
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel controls" aria-label="出題設定">
          <div class="segmented" role="tablist" aria-label="出題範囲">
            <button class="segment active" type="button" data-filter="all">全問</button>
            <button class="segment" type="button" data-filter="missed">間違い</button>
            <button class="segment" type="button" data-filter="bookmarked">保存</button>
            <button class="segment" type="button" data-filter="weak">苦手</button>
          </div>

          <label class="toggle-row">
            <span>未回答を優先</span>
            <input id="unansweredFirst" type="checkbox" checked>
          </label>

          <label class="toggle-row">
            <span>選択肢をシャッフル</span>
            <input id="shuffleChoices" type="checkbox" checked>
          </label>

          <label class="toggle-row">
            <span>回答後に自動で解説</span>
            <input id="autoExplain" type="checkbox" checked>
          </label>

          <div class="range-row">
            <label for="rangeStart">開始</label>
            <input id="rangeStart" type="number" min="1" value="1">
            <label for="rangeEnd">終了</label>
            <input id="rangeEnd" type="number" min="1" value="181">
          </div>

          <div class="button-grid">
            <button id="nextQuestion" class="tool-button primary" type="button" aria-label="次の問題">
              <span aria-hidden="true">→</span>
            </button>
            <button id="bookmark" class="tool-button" type="button" aria-label="ブックマーク">
              <span aria-hidden="true">☆</span>
            </button>
            <button id="resetCurrent" class="tool-button" type="button" aria-label="この問題を未回答に戻す">
              <span aria-hidden="true">↺</span>
            </button>
            <button id="resetAll" class="tool-button danger" type="button" aria-label="全履歴をリセット">
              <span aria-hidden="true">×</span>
            </button>
          </div>

          <div class="mini-list">
            <h2>Queue</h2>
            <div id="queueList" class="queue-list"></div>
          </div>
        </aside>

        <section class="question-stage" aria-live="polite">
          <div id="emptyState" class="empty-state" hidden>
            <p>問題データがありません。</p>
            <code>npm run scrape</code>
          </div>

          <article id="questionCard" class="question-card">
            <header class="question-meta">
              <div>
                <p id="questionNumber" class="eyebrow">Question</p>
                <h2 id="questionTitle">Loading...</h2>
              </div>
              <a id="sourceLink" class="source-link" href="#" target="_blank" rel="noreferrer">Source</a>
            </header>

            <p id="questionText" class="question-text"></p>

            <div id="choiceList" class="choice-list"></div>

            <div class="action-row">
              <button id="submitAnswer" class="action-button primary" type="button">回答する</button>
              <button id="showAnswer" class="action-button" type="button">解説</button>
            </div>

            <section id="resultPanel" class="result-panel" hidden>
              <div id="resultBadge" class="result-badge"></div>
              <div id="answerSummary" class="answer-summary"></div>
              <div id="explanationList" class="explanation-list"></div>
            </section>
          </article>
        </section>
      </section>

      <nav id="mobileCommandBar" class="mobile-command-bar" aria-label="モバイル操作" hidden>
        <button id="mobileSubmitAnswer" class="mobile-command primary" type="button">回答</button>
        <button id="mobileShowAnswer" class="mobile-command" type="button">解説</button>
        <button id="mobileNextQuestion" class="mobile-command primary" type="button">次へ</button>
        <button id="mobileBookmark" class="mobile-command icon" type="button" aria-label="ブックマーク">
          <span aria-hidden="true">☆</span>
        </button>
      </nav>
    </main>

    <script src="./data/questions.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
